name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check lockfile
        run: uv lock --check

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} --with pytest --with-editable . pytest

      - name: Import package
        run: uv run --python ${{ matrix.python-version }} python -c "import recon_lite; print(recon_lite.__file__)"

      - name: Import public API
        run: uv run --python ${{ matrix.python-version }} python -c "from recon_lite import ReConEngine, Graph"

      - name: Run grid-world smoke tests
        run: |
          uv run --python ${{ matrix.python-version }} python -m recon_lite.examples.gridworld --mode discrete --steps 3
          uv run --python ${{ matrix.python-version }} python -m recon_lite.examples.gridworld --mode continuous --steps 3 --microticks 2 --trace-json traces/gridworld.json
          test -s traces/gridworld.json

      - name: Build package
        run: uv build

      - name: Install built wheel in a clean environment
        run: |
          uv venv --python ${{ matrix.python-version }} .venv-wheel
          uv pip install --python .venv-wheel/bin/python dist/*.whl
          .venv-wheel/bin/python -c "import recon_lite; print(recon_lite.__version__)"
